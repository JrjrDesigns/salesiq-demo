    align-items: center;

    text-transform: uppercase;

    align-items: center;

  .page-title {

    font-size: 1.8rem;
    letter-spacing: 0.04em;
    color: var(--ink);

  .page-meta {

    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);

    gap: 0.8rem;

  }

  .kpi-4 { grid-template-columns: repeat(4, 1fr); }
  .kpi-3 { grid-template-columns: repeat(3, 1fr); }
  .kpi-5 { grid-template-columns: repeat(5, 1fr); }

  .kpi-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-top: 4px solid var(--ink);
    padding: 1rem 1.2rem;
  }

  .kpi-card.green { border-top-color: #1a6a9a; }
  .kpi-card.blue { border-top-color: #1a3a5c; }
  .kpi-card.orange { border-top-color: #4a90c4; }
  .kpi-card.red { border-top-color: #c0392b; }
  .kpi-card.yellow { border-top-color: #2980b9; }

  .kpi-label {

    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);

    font-size: 2.2rem;

    color: var(--ink);
    letter-spacing: 0.02em;
    margin-bottom: 0.2rem;

  .kpi-sub .down { color: var(--red); font-weight: 600; }
  .kpi-sub .warn { color: var(--orange); font-weight: 600; }

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }

  .span-2 { grid-column: span 2; }
  .span-3 { grid-column: span 3; }

    font-size: 8.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 0.6rem;

  .rep-stat {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.25rem;
    font-size: 11px;

  .rep-stat-label { color: var(--mid); }

    gap: 0.6rem;
    padding: 0.5rem 0;

  .metric-label { font-size: 12px; color: var(--mid); flex: 1; }
  .metric-val { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }

    margin-top: 2rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 0.06em;
  }

  @media (max-width: 900px) {
    .kpi-4, .kpi-5 { grid-template-columns: 1fr 1fr; }
    .kpi-3 { grid-template-columns: 1fr 1fr; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .span-2, .span-3 { grid-column: span 1; }
  }
</style>

function Pill({ label, color }) {
  return <span className={`pill pill-${color}`}>{label}</span>;
}

function KpiCard({ label, value, sub, color = 'green' }) {
  return (
    <div className={`kpi-card ${color}`}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      {sub && <div className="kpi-sub" dangerouslySetInnerHTML={{ __html: sub }} />}

  );
}

function Card({ title, tag, tagColor = 'blue', children, flush }) {

    <div className="card">

      <div className={flush ? 'card-body-flush' : 'card-body'}>{children}</div>

  );

function BarChart({ id, labels, datasets, height = 180, yFmt }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: datasets.length > 1, labels: { font: { family: 'DM Sans', size: 11 }, boxWidth: 10 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Mono', size: 9 }, color: '#6b6b6b' } },
          y: { grid: { color: '#f0f0ee' }, ticks: { font: { family: 'DM Mono', size: 9 }, color: '#6b6b6b', callback: yFmt || (v => v) } }
        }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, []);
  return <div className="chart-wrap" style={{ height }}><canvas ref={ref} id={id}></canvas></div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
const TABS = [
  { id: 'executive', label: 'Executive' },
  { id: 'sales', label: 'Sales' },
  { id: 'operations', label: 'Operations' },
  { id: 'marketing', label: 'Marketing' },
  { id: 'alerts', label: 'Alerts & Flags' },
];

// Global mutable data store — updated by fetch, read by all views
let LIVE_DATA = DATA;

function App() {
  const [active, setActive] = useState('executive');
  const [lastUpdated, setLastUpdated] = useState(new Date().toLocaleString());
  const [dataSource, setDataSource] = useState('fallback');
  const [fetchStatus, setFetchStatus] = useState('Connecting...');

  // Fetch from n8n and update LIVE_DATA
  const fetchData = async () => {
    try {
      const res = await fetch(N8N_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();

      // n8n returns array or object — handle both
      const payload = Array.isArray(raw) ? raw[0] : raw;

      // Extract the four sources from whatever structure n8n returns
      let epicor = payload.epicor || payload.json?.epicor || LIVE_DATA.epicor;
      let salesforce = payload.salesforce || payload.json?.salesforce || LIVE_DATA.salesforce;
      let pardot = payload.pardot || payload.json?.pardot || LIVE_DATA.pardot;
      let marketingCloud = payload.marketingCloud || payload.json?.marketingCloud || LIVE_DATA.marketingCloud;

      // If combined string exists parse it
      if (payload.combined) {
        try {
          const parsed = JSON.parse(payload.combined);
          epicor = parsed.epicor || epicor;
          salesforce = parsed.salesforce || salesforce;
          pardot = parsed.pardot || pardot;
          marketingCloud = parsed.marketingCloud || marketingCloud;
        } catch(e) {}
      }

      LIVE_DATA = { epicor, salesforce, pardot, marketingCloud };
      setDataSource('live');
      setFetchStatus('Live — n8n');
      setLastUpdated(new Date().toLocaleString());
    } catch (err) {
      setFetchStatus('Using fallback data');
      setDataSource('fallback');
    }
  };

  useEffect(() => {
    fetchData();
    const interval = setInterval(fetchData, POLL_INTERVAL);
    return () => clearInterval(interval);
  }, []);

  const views = {
    executive: <ExecutiveView />,
    sales: <SalesView />,
    operations: <OperationsView />,
    marketing: <MarketingView />,
    alerts: <AlertsView />,
  };

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">
          <img src="https://raw.githubusercontent.com/jrjrdesigns/salesiq-demo/main/LakeShoreLogo.png" alt="Lake Shore Cryotronics" style={{ height: '32px', objectFit: 'contain' }} />
        </div>
        <div className="nav-tabs">
          {TABS.map(t => (
            <div key={t.id} className={`nav-tab ${active === t.id ? 'active' : ''}`} onClick={() => setActive(t.id)}>
              {t.label}
              {t.id === 'alerts' && <span style={{ marginLeft: '0.4rem', background: 'var(--red)', color: 'white', fontFamily: 'DM Mono', fontSize: '8px', padding: '0.1rem 0.35rem', borderRadius: '2px' }}>5</span>}
            </div>
          ))}
        </div>
        <div className="nav-right">
          <div className="nav-badge">Epicor · Salesforce · Pardot · Marketing Cloud</div>
          <div className="live-indicator">
            <div className="live-dot" style={{ background: dataSource === 'live' ? 'var(--green)' : 'var(--orange)' }}></div>
            {fetchStatus}
          </div>
        </div>
      </nav>

      <div style={{ background: 'var(--yellow-light)', borderBottom: '2px solid var(--yellow)', padding: '0.35rem 1.5rem', fontFamily: 'DM Mono', fontSize: '9px', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--yellow)', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
        ⚠ Simulated data — proof of concept demonstration &nbsp;·&nbsp; Data source: {fetchStatus}
      </div>

      <div className="container">
        {views[active]}
        <div className="dash-footer">
          <span>AI Integration Layer &nbsp;·&nbsp; Data: Epicor · Salesforce · Pardot · Marketing Cloud</span>
          <span>Last updated: {lastUpdated} &nbsp;·&nbsp; Polling every 5s</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
