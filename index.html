// ── DERIVED METRICS — all calculated from live data ───────────────────────────
function deriveMetrics(d) {
  const opps = d.salesforce.opportunities || [];
  const won = opps.filter(o => o.Stage === 'Closed Won');
  const lost = opps.filter(o => o.Stage === 'Closed Lost');
  const open = opps.filter(o => o.Stage !== 'Closed Won' && o.Stage !== 'Closed Lost');

  const byStage = {};

    const stageOpps = opps.filter(o => o.Stage === s);
    byStage[s] = {
      count: stageOpps.length,
      total: stageOpps.reduce((sum, o) => sum + Number(o.Amount || 0), 0)
    };
  });
  const maxStageTotal = Math.max(...Object.values(byStage).map(s => s.total), 1);

  // Top accounts won — sorted by amount

  // Top accounts open — sorted by amount
  const topOpen = [...open].sort((a, b) => Number(b.Amount) - Number(a.Amount)).slice(0, 5);

  // Rep performance — calculated from opportunities
  const reps = {};
  opps.forEach(o => {
    const rep = o.OpportunityOwner || 'Unknown';
    if (!reps[rep]) reps[rep] = { name: rep, territory: o.Territory || '', won: 0, wonDeals: 0, lost: 0, lostDeals: 0, open: 0, openDeals: 0, highConf: 0 };

    if (o.Stage === 'Closed Lost') { reps[rep].lost += Number(o.Amount || 0); reps[rep].lostDeals++; }
    if (o.Stage !== 'Closed Won' && o.Stage !== 'Closed Lost') { reps[rep].open += Number(o.Amount || 0); reps[rep].openDeals++; }
    if (Number(o.Confidence || 0) >= 80 || Number(o.ProbabilityPercent || 0) >= 80) reps[rep].highConf += Number(o.Amount || 0);
  });

    ...r,
    total: r.wonDeals + r.lostDeals,
    winRate: (r.wonDeals + r.lostDeals) > 0 ? Math.round((r.wonDeals / (r.wonDeals + r.lostDeals)) * 100) : 0

  // Jobs at risk
  const jobsAtRisk = (d.epicor.jobs || []).filter(j => {
    if (j.Status !== 'OPEN' || !j.ShipByDate || !j.Due) return false;
    return new Date(j.Due) > new Date(j.ShipByDate);
  });

  // Prospects
  const prospects = d.pardot.prospects || [];
  const avgScore = prospects.length > 0 ? Math.round(prospects.reduce((s, p) => s + Number(p.TotalScore || 0), 0) / prospects.length) : 0;

  // Email campaigns
  const campaigns = d.marketingCloud.email_campaigns || [];
  const totalSent = campaigns.reduce((s, c) => s + Number(c.TotalSent || 0), 0);
  const avgOpen = campaigns.length > 0 ? (campaigns.reduce((s, c) => s + Number(c.OpenRate || 0), 0) / campaigns.length).toFixed(1) : 0;

  // Landing pages
  const pages = d.marketingCloud.landing_pages || [];

  // Alerts — generated dynamically from data
  const alerts = [];
  jobsAtRisk.forEach(j => {
    alerts.push({ type: 'critical', title: 'Production Miss — ' + j.Part, body: 'Job ' + j.JobNumber + ' due ' + j.Due + ' — AFTER ship by date ' + j.ShipByDate + '. Only ' + j.Completed + ' of ' + j.OriginalProductionQty + ' units complete. Escalate to planner ' + j.Planner + '.' });
  });
  invAlerts.forEach(i => {
    alerts.push({ type: 'critical', title: 'Inventory Shortage — ' + i.PartNum, body: i.PartDescription + ' available qty is ' + i.AvailableQty + '. Lead time ' + i.LeadTimeDays + ' days. Open orders cannot be fulfilled without action.' });
  });
  prospects.filter(p => Number(p.TotalScore) >= 80 && !p.SalesforceLeadID).forEach(p => {
    alerts.push({ type: 'warning', title: 'High Score Prospect — No Lead Created', body: p.Name + ' at ' + p.CompanyName + ' — score ' + p.TotalScore + '. No Salesforce lead yet. Create lead and assign to territory rep.' });
  });
  prospects.filter(p => Number(p.TotalScore) >= 80 && p.SalesforceLeadID).forEach(p => {
    alerts.push({ type: 'warning', title: 'High Priority Lead — Follow Up Needed', body: p.Name + ' at ' + p.CompanyName + ' — Pardot score ' + p.TotalScore + '. Mapped to lead ' + p.SalesforceLeadID + '. Recommend immediate sales outreach.' });
  });
  const missingEpicorOpps = won.filter(o => !o.EpicorQuoteNumber || o.EpicorQuoteNumber === '');
  missingEpicorOpps.forEach(o => {
    alerts.push({ type: 'warning', title: 'Closed Won — No Epicor Quote Number', body: o.OpportunityName + ' (' + fmt(o.Amount) + ') is Closed Won but has no Epicor Quote Number. Verify order entry.' });
  });
  const rfqInquiries = (d.salesforce.inquiries || []).filter(i => i.IsCurrentCustomer);
  rfqInquiries.forEach(i => {
    alerts.push({ type: 'success', title: 'Fast Path — Existing Customer RFQ', body: i.Company + ' submitted ' + i.InquiryID + ' for ' + i.InquiringAbout + ' — ' + i.Products + '. Existing customer match. Ready to process.' });
  });

  return { won, lost, open, opps, totalWon, totalLost, totalOpen, totalAll, winRate, byStage, maxStageTotal, topWon, topOpen, repList, invAlerts, jobsAtRisk, prospects, avgScore, campaigns, totalSent, avgOpen, pages, alerts };
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function Pill({ label, color }) { return <span className={`pill pill-${color}`}>{label}</span>; }

function KpiCard({ label, value, sub, color = 'good' }) {
  return (
    <div className={`kpi-card ${color}`}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      {sub && <div className="kpi-sub" dangerouslySetInnerHTML={{ __html: sub }} />}
    </div>
  );
}

function Card({ title, tag, tagColor = 'blue', children, flush }) {
  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title">{title}</div>
        {tag && <span className={`tag tag-${tagColor}`}>{tag}</span>}
      </div>
      <div className={flush ? 'card-body-flush' : 'card-body'}>{children}</div>
    </div>
  );
}

function AlertCard({ type = 'critical', title, body }) {
  const cls = { critical: '', warning: 'warn', success: 'success', info: 'info' }[type] || '';
  const colors = { critical: 'alert', warning: 'warn', success: 'good', info: 'accent' };
  return (
    <div className={`alert-card ${cls}`}>
      <div className="alert-header">
        <div className="alert-title">{title}</div>
        <Pill label={type.toUpperCase()} color={colors[type]} />
      </div>
      <div className="alert-body" dangerouslySetInnerHTML={{ __html: body }} />
    </div>
  );
}

function BarChart({ id, labels, datasets, height = 180, yFmt }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: datasets.length > 1, labels: { font: { family: 'DM Sans', size: 11 }, boxWidth: 10 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Mono', size: 9 }, color: '#5a7a9a' } },
          y: { grid: { color: '#d0dce8' }, ticks: { font: { family: 'DM Mono', size: 9 }, color: '#5a7a9a', callback: yFmt || (v => v) } }
        }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [JSON.stringify(datasets)]);
  return <div className="chart-wrap" style={{ height }}><canvas ref={ref}></canvas></div>;
}

          {criticals.length > 0 && (
            <div>
              <div style={{ fontFamily: 'DM Mono', fontSize: '9px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--mid)', marginBottom: '0.6rem' }}>Critical</div>
              {criticals.map((a, i) => <AlertCard key={i} type="critical" title={a.title} body={a.body} />)}
            </div>
          )}
          {warnings.length > 0 && (
            <div style={{ marginTop: '1rem' }}>
              <div style={{ fontFamily: 'DM Mono', fontSize: '9px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--mid)', marginBottom: '0.6rem' }}>Warnings</div>
              {warnings.map((a, i) => <AlertCard key={i} type="warning" title={a.title} body={a.body} />)}
            </div>
          )}
        </div>
        <div>
          {successes.length > 0 && (
            <div>
              <div style={{ fontFamily: 'DM Mono', fontSize: '9px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--mid)', marginBottom: '0.6rem' }}>Fast Path — Ready to Process</div>
              {successes.map((a, i) => <AlertCard key={i} type="success" title={a.title} body={a.body} />)}
            </div>
          )}
          {m.alerts.length === 0 && (
            <div style={{ textAlign: 'center', padding: '2rem', color: 'var(--mid)' }}>No alerts generated from current data</div>
          )}
        </div>
      </div>
    </div>
  );
}

function ExecutiveView({ d }) {
  const m = deriveMetrics(d);
  const topActions = m.alerts.filter(a => a.type === 'critical').slice(0, 3);

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Executive Summary</div>
        <div className="page-meta">All Systems · Calculated from live data</div>
      </div>

      <div className="kpi-row kpi-5">
        <KpiCard label="Total Closed Won" value={fmt(m.totalWon)} sub={`<span class="up">${m.won.length} deals</span>`} color="good" />
        <KpiCard label="Open Pipeline" value={fmt(m.totalOpen)} sub={`${m.open.length} active deals`} color="blue" />
        <KpiCard label="Win Rate" value={m.winRate + '%'} sub={`${m.won.length}W · ${m.lost.length}L`} color="accent" />
        <KpiCard label="Critical Alerts" value={m.alerts.filter(a => a.type === 'critical').length} sub={`<span class="dn">Need immediate action</span>`} color="alert" />
        <KpiCard label="Fast Path Ready" value={m.alerts.filter(a => a.type === 'success').length} sub={`<span class="up">Auto-matched RFQs</span>`} color="good" />
      </div>

      <div className="grid-2">
        <Card title="Pipeline by Stage" tag="All Opportunities" tagColor="blue">
          {Object.entries(m.byStage).map(([stage, data]) => {
            const colors = { 'Discovery': '#1a3a5c', 'Solution': '#2a5a8c', 'Quote': '#4a90c4', 'Negotiation': '#e67e22', 'Closed Won': '#1a6a9a', 'Closed Lost': '#c0392b' };
            return (
              <div key={stage} className="stage-row">
                <div className="stage-label">{stage}</div>
                <div className="bar-track"><div className="bar-fill" style={{ width: m.maxStageTotal > 0 ? (data.total / m.maxStageTotal * 100) + '%' : '0%', background: colors[stage] }}></div></div>
                <div className="stage-amt">{fmt(data.total)}</div>
                <div className="stage-ct">{data.count}</div>
              </div>
            );
          })}
        </Card>

        <Card title="Systems Status" tag="Live" tagColor="good">
          {[
            { sys: 'Epicor ERP', detail: `${(d.epicor.sales_orders||[]).length} orders · ${(d.epicor.jobs||[]).length} jobs · ${(d.epicor.inventory||[]).length} parts` },
            { sys: 'Salesforce CRM', detail: `${(d.salesforce.opportunities||[]).length} opps · ${(d.salesforce.leads||[]).length} leads · ${(d.salesforce.quotes||[]).length} quotes` },
            { sys: 'Pardot MCAE', detail: `${(d.pardot.prospects||[]).length} prospects` },
            { sys: 'Marketing Cloud', detail: `${(d.marketingCloud.landing_pages||[]).length} pages · ${(d.marketingCloud.email_campaigns||[]).length} campaigns` },
          ].map(s => (
            <div key={s.sys} className="metric-row">
              <span className="metric-label"><strong>{s.sys}</strong><br /><span style={{ fontSize: '11px' }}>{s.detail}</span></span>
              <Pill label="Connected" color="good" />
            </div>
          ))}
        </Card>
      </div>

      <div className="grid-2">
        <Card title="Top Actions Required" tag="From Live Alerts" tagColor="alert">
          {topActions.length > 0 ? topActions.map((a, i) => (
            <div key={i} className="metric-row">
              <span style={{ fontFamily: 'Bebas Neue', fontSize: '1.4rem', color: 'var(--alert)', lineHeight: 1, flexShrink: 0 }}>{i+1}</span>
              <span className="metric-label" style={{ color: 'var(--ink)', fontSize: '12px' }}>{a.title}</span>
            </div>
          )) : (
            <div style={{ textAlign: 'center', padding: '1rem', color: 'var(--mid)' }}>No critical actions at this time</div>
          )}
        </Card>

        <Card title="Rep Summary" tag="All Reps" tagColor="blue" flush>
          <table className="tbl">
            <thead><tr><th>Rep</th><th>Territory</th><th>Won</th><th>Win Rate</th></tr></thead>
            <tbody>
              {m.repList.map(r => (
                <tr key={r.name}>
                  <td><strong>{r.name}</strong></td>
                  <td><span className="mono c-mid">{r.territory}</span></td>
                  <td><span className="mono c-good">{fmt(r.won)}</span></td>
                  <td><span className={`mono bold ${r.winRate >= 60 ? 'c-good' : 'c-warn'}`}>{r.winRate}%</span></td>
                </tr>
              ))}
              {m.repList.length === 0 && <tr><td colSpan={4} style={{ textAlign: 'center', color: 'var(--mid)', padding: '1rem' }}>No rep data</td></tr>}
            </tbody>
          </table>
        </Card>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
const TABS = [
  { id: 'executive', label: 'Executive' },
  { id: 'sales', label: 'Sales' },
  { id: 'operations', label: 'Operations' },
  { id: 'marketing', label: 'Marketing' },
  { id: 'alerts', label: 'Alerts & Flags' },
];

function App() {
  const [active, setActive] = useState('executive');
  const [liveData, setLiveData] = useState(FALLBACK);
  const [lastUpdated, setLastUpdated] = useState(new Date().toLocaleString());
  const [fetchStatus, setFetchStatus] = useState('Connecting...');
  const [isLive, setIsLive] = useState(false);

  const fetchData = async () => {
    try {
      const res = await fetch(N8N_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();
      const payload = Array.isArray(raw) ? raw[0] : raw;

      let epicor = payload.epicor || payload.json?.epicor || liveData.epicor;
      let salesforce = payload.salesforce || payload.json?.salesforce || liveData.salesforce;
      let pardot = payload.pardot || payload.json?.pardot || liveData.pardot;
      let marketingCloud = payload.marketingCloud || payload.json?.marketingCloud || liveData.marketingCloud;

      if (payload.combined && typeof payload.combined === 'string') {
        try {
          const parsed = JSON.parse(payload.combined);
          epicor = parsed.epicor || epicor;
          salesforce = parsed.salesforce || salesforce;
          pardot = parsed.pardot || pardot;
          marketingCloud = parsed.marketingCloud || marketingCloud;
        } catch(e) {}
      }

      setLiveData({ epicor, salesforce, pardot, marketingCloud });
      setIsLive(true);
      setFetchStatus('Live — n8n');
      setLastUpdated(new Date().toLocaleString());
    } catch (err) {
      setFetchStatus('Fallback data');
      setIsLive(false);
    }
  };

  useEffect(() => {
    fetchData();
    const interval = setInterval(fetchData, POLL_INTERVAL);
    return () => clearInterval(interval);
  }, []);

  const alertCount = deriveMetrics(liveData).alerts.length;

  const views = {
    executive: <ExecutiveView d={liveData} />,
    sales: <SalesView d={liveData} />,
    operations: <OperationsView d={liveData} />,
    marketing: <MarketingView d={liveData} />,
    alerts: <AlertsView d={liveData} />,
  };

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">
          <img src="https://raw.githubusercontent.com/jrjrdesigns/salesiq-demo/main/LakeShoreLogo.png" alt="Lake Shore Cryotronics" style={{ height: '44px', objectFit: 'contain' }} />
        </div>
        <div className="nav-tabs">
          {TABS.map(t => (
            <div key={t.id} className={`nav-tab ${active === t.id ? 'active' : ''}`} onClick={() => setActive(t.id)}>
              {t.label}
              {t.id === 'alerts' && alertCount > 0 && <span style={{ marginLeft: '0.4rem', background: 'var(--alert)', color: 'white', fontFamily: 'DM Mono', fontSize: '8px', padding: '0.1rem 0.35rem' }}>{alertCount}</span>}
            </div>
          ))}
        </div>
        <div className="nav-right">
          <div className="nav-badge">Epicor · Salesforce · Pardot · Marketing Cloud</div>
          <div className="live-indicator">
            <div className="live-dot" style={{ background: isLive ? '#4a90c4' : 'var(--warn)' }}></div>
            {fetchStatus}
          </div>
        </div>
      </nav>

      <div className="demo-banner">
        ⚠ Simulated data — proof of concept &nbsp;·&nbsp; Source: {fetchStatus} &nbsp;·&nbsp; Polling every 5s
      </div>

      <div className="container">
        {views[active]}
        <div className="dash-footer">
          <span>Lake Shore Cryotronics AI Intelligence Platform &nbsp;·&nbsp; Epicor · Salesforce · Pardot · Marketing Cloud</span>
          <span>Last updated: {lastUpdated}</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
